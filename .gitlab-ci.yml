# GitLab CI - YiJing Windows .exe build
# 推到 GitLab: git remote add gitlab https://gitlab.com/<user>/yijing-release.git && git push -u gitlab main

stages:
  - test
  - build

variables:
  PYTHON_VERSION: "3.11"

test:self-test:
  stage: test
  image: python:3.11
  before_script:
    - apt-get update -qq && apt-get install -y -qq tk
  script:
    - python yi_gui.py --self-test

build:windows-exe:
  stage: build
  tags:
    - windows  # 需要 Windows runner (gitlab.com shared runners 没有)
  before_script:
    - python -m pip install --upgrade pip pyinstaller
  script:
    - python yi_gui.py --self-test
    - python -m PyInstaller --onefile --windowed --name YiJing --noconfirm --clean --collect-all tkinter yi_gui.py
    - if not exist "dist\YiJing.exe" exit /b 1
    - dir dist\YiJing.exe
  artifacts:
    expire_in: 90 days
    paths:
      - dist/YiJing.exe
  only:
    - main
    - tags
