<style>

    --ink: #F5F1E8;
    --ink-2: #C9BFA8;
    --muted: #8A7E66;
    --accent: #B23A2E;
    --accent-2: #C9A55C;

  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--ink);

    font-size: 15px; line-height: 1.6; min-height: 100vh;
  }
  body {
    background:

      radial-gradient(circle at 80% 100%, #1F1A14 0%, transparent 50%),
      var(--bg);
  }
  header {
    border-bottom: 1px solid var(--line);
    padding: 14px 28px;
    display: flex; align-items: center; gap: 18px;
    background: rgba(20,17,14,0.85);
    backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-svg { width: 36px; height: 36px; }
  .title { font-size: 22px; font-weight: 700; letter-spacing: 4px; color: var(--ink); }
  .ver {
    font-size: 12px; color: var(--muted); margin-left: 4px;
    padding: 2px 8px; border: 1px solid var(--line); border-radius: 4px;
  }
  .spacer { flex: 1; }
  button {
    background: var(--bg-3); color: var(--ink);
    border: 1px solid var(--line-strong);
    padding: 8px 18px; border-radius: 4px;
    font-family: inherit; font-size: 14px; cursor: pointer;
    transition: all 0.15s;
  }
  button:hover { background: var(--line); border-color: var(--accent-2); }
  button.primary { background: var(--accent); border-color: var(--accent); color: var(--ink); font-weight: 600; }
  button.primary:hover { background: #C84A3A; }
  button.ghost { background: transparent; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  main { max-width: 1280px; margin: 0 auto; padding: 24px 28px 80px; }
  .qrow { display: flex; gap: 12px; margin-bottom: 14px; }
  .qrow input {
    flex: 1; background: var(--bg-2); border: 1px solid var(--line);
    color: var(--ink); padding: 10px 16px; border-radius: 4px;
    font-family: inherit; font-size: 15px;
  }
  .qrow input:focus { outline: none; border-color: var(--accent-2); }
  .hint { color: var(--muted); font-size: 13px; padding: 6px 0 14px; }
  .triple { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
  .hex-panel {
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 6px; padding: 18px 20px; min-height: 380px;
    position: relative; transition: opacity 0.2s;
  }
  .hex-panel.dim { opacity: 0.45; }
  .hex-panel h3 {
    font-size: 14px; color: var(--muted); margin-bottom: 6px;
    font-weight: 500; letter-spacing: 2px;
  }
  .hex-name {
    font-size: 26px; font-weight: 700; color: var(--accent);
    margin-bottom: 4px; letter-spacing: 2px;
  }
  .hex-meta { font-size: 13px; color: var(--ink-2); margin-bottom: 8px; }
  .hex-binary {
    font-family: "JetBrains Mono", "SF Mono", monospace;
    color: var(--accent-2); font-size: 14px; margin-bottom: 6px;
  }
  .hex-guaci {
    font-size: 14px; line-height: 1.7; color: var(--ink);
    margin-top: 12px; padding-top: 12px;
    border-top: 1px dashed var(--line);
  }
  .hex-empty { text-align: center; color: var(--muted); padding: 60px 0; font-style: italic; }
  .detail {
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 6px; padding: 22px 26px; margin-bottom: 20px;
  }
  .detail h2 {
    font-size: 18px; color: var(--accent-2); margin-bottom: 14px;
    letter-spacing: 2px; font-weight: 600;
  }
  .hex-section { margin-bottom: 22px; }
  .hex-section h3 {
    font-size: 15px; color: var(--ink); margin-bottom: 8px;
    padding-bottom: 4px; border-bottom: 1px solid var(--line);
  }
  .hex-section .guaci { color: var(--ink); padding: 6px 0; font-size: 14px; }
  .hex-section .xiang { color: var(--ink-2); padding: 6px 0; font-size: 14px; font-style: italic; }
  .hex-section .lines { list-style: none; padding-left: 12px; }
  .hex-section .lines li { color: var(--ink-2); font-size: 14px; padding: 3px 0; }
  .hex-section .lines li.moving { color: var(--accent); font-weight: 600; }
  .hex-section .lines li.moving::before { content: "▶ "; color: var(--accent); }
  .ai {
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 6px; padding: 22px 26px;
  }
  .ai-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .ai-header h2 { font-size: 18px; color: var(--accent-2); letter-spacing: 2px; }
  .ai-status {
    font-size: 12px; color: var(--muted); padding: 2px 8px;
    border: 1px solid var(--line); border-radius: 3px;
  }
  .ai-status.busy { color: var(--accent); border-color: var(--accent); }
  .ai-out {
    min-height: 200px; background: var(--bg);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 16px 20px; font-size: 14px; line-height: 1.8;
    white-space: pre-wrap; color: var(--ink-2);
  }
  .ai-out.empty { color: var(--muted); font-style: italic; }
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg-2); border: 1px solid var(--line-strong);
    border-radius: 6px; padding: 24px 28px; width: 540px; max-width: 90vw;
  }
  .modal h2 { font-size: 18px; color: var(--accent-2); margin-bottom: 16px; letter-spacing: 2px; }
  .modal label { display: block; color: var(--ink-2); font-size: 13px; margin: 10px 0 4px; }
  .modal input, .modal select {
    width: 100%; padding: 8px 12px; background: var(--bg); color: var(--ink);
    border: 1px solid var(--line); border-radius: 4px;
    font-family: inherit; font-size: 14px;
  }
  .modal .row { display: flex; gap: 10px; align-items: flex-end; }
  .modal .row > * { flex: 1; }
  .modal-foot { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .modal-foot button { padding: 6px 16px; }
  .cast-fab {
    position: fixed; right: 28px; bottom: 28px;
    width: 76px; height: 76px; border-radius: 50%;
    background: var(--accent); color: var(--ink);
    border: 2px solid var(--accent-2);
    font-family: inherit; font-size: 28px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 20px rgba(178,58,46,0.4);
    transition: all 0.2s; z-index: 5;
  }
  .cast-fab:hover { transform: scale(1.05); }
  .bagua-svg { display: block; }
  .bagua-line { stroke: var(--ink-2); stroke-width: 6; fill: none; }
  .bagua-yang { stroke: var(--accent-2); }
  .bagua-old { stroke: var(--accent); stroke-dasharray: 8 4; }
  .bagua-mark { fill: var(--accent); font-size: 12px; font-weight: 700; }
  @media (max-width: 800px) {
    .triple { grid-template-columns: 1fr; }
    .title { font-size: 18px; }
    main { padding: 16px; }
  }
</style>
</head>

<header>

  <button id="btn-settings" class="ghost">设 置</button>

<main>
  <div class="qrow">

  </div>

  <div class="triple" id="triple">
    <div class="hex-panel" id="panel-main">
      <h3>本 卦</h3>
      <div class="hex-empty">— 未起卦 —</div>
    </div>
    <div class="hex-panel dim" id="panel-nuclear">
      <h3>互 卦</h3>
      <div class="hex-empty">— 起卦后显示 —</div>
    </div>
    <div class="hex-panel dim" id="panel-changed">
      <h3>变 卦</h3>
      <div class="hex-empty">— 起卦后显示 —</div>
    </div>
  </div>

  <div class="detail" id="detail">
    <h2>详细解读</h2>
    <div id="detail-body" style="color: var(--muted); font-style: italic;">起卦后此处显示卦辞、象传、爻辞与动爻</div>
  </div>

  <div class="ai">
    <div class="ai-header">
      <h2>AI 解卦</h2>
      <span class="ai-status" id="ai-status">未配置</span>
    </div>
    <div class="ai-out empty" id="ai-out">点 "问道士" 让 AI 解读本卦(需先在「设置」填 API Key)</div>
  </div>
</main>

<button class="cast-fab" id="fab" title="起卦">卦</button>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>设置 AI 解卦</h2>
    <label>厂商预设</label>
    <select id="cfg-provider">
      <option value="deepseek">DeepSeek (默认,中文好/便宜)</option>
      <option value="openai">OpenAI</option>
      <option value="qwen">通义千问 Qwen</option>
      <option value="glm">智谱 GLM</option>
      <option value="moonshot">月之暗面 Moonshot</option>
      <option value="minimax">MiniMax / MiniMax (MiniMax-Text-01)</option>
      <option value="custom">自定义</option>
    </select>
    <label>API Key</label>
    <input id="cfg-key" type="password" placeholder="sk-...">
    <div class="row">
      <div style="flex:2">
        <label>Base URL</label>
        <input id="cfg-url" type="text" placeholder="https://api.deepseek.com/v1">
      </div>
      <div style="flex:1">
        <label>Model</label>
        <input id="cfg-model" type="text" placeholder="deepseek-chat">
      </div>
    </div>
    <div class="modal-foot">
      <button id="cfg-clear" class="ghost">清除</button>
      <button id="cfg-cancel" class="ghost">取消</button>
      <button id="cfg-save" class="primary">保存</button>
    </div>
  </div>
</div>

<script>
const HEX = YI_DATA.hex;
const HEX_BY_NUM = Object.fromEntries(HEX.map(h => [h.num, h]));
const HEX_BY_BIN = {};
for (const h of HEX) {
  (HEX_BY_BIN[h.binary] = HEX_BY_BIN[h.binary] || []).push(h);
}

const TRIGRAM_GLYPH = {
  "乾": "☰", "兑": "☱", "离": "☲", "震": "☳",
  "巽": "☴", "坎": "☵", "艮": "☶", "坤": "☷",
};

function tossThreeCoins() {
  let s = 0;
  for (let i = 0; i < 3; i++) s += Math.random() < 0.5 ? 2 : 3;
  return s;
}
const LINE_MAP = { 6: [0, "老阴"], 7: [1, "少阳"], 8: [0, "少阴"], 9: [1, "老阳"] };
function castSixLines() {
  const out = [];
  for (let i = 0; i < 6; i++) out.push([tossThreeCoins(), ...LINE_MAP[tossThreeCoinsAlt()]]);
  return out;
}
function tossThreeCoinsAlt() { return tossThreeCoins(); }
function castSixLines2() {
  const out = [];
  for (let i = 0; i < 6; i++) {
    const s = tossThreeCoins();
    out.push([s, ...LINE_MAP[s]]);
  }
  return out;
}
function lineToYinYang(line) {
  const [s, v] = line;
  if (s === 9) return 0;
  if (s === 6) return 1;
  return v;
}
function linesToBinary(lines) { return lines.map(lineToYinYang).join(""); }
function nuclearBinary(lines) {
  const v = lines.map(lineToYinYang);
  return [...v.slice(2,5), ...v.slice(1,4)].join("");
}
function binaryToHex(b) {
  const arr = HEX_BY_BIN[b] || [];
  return arr[Math.floor(Math.random() * arr.length)];
}
function cast(question) {
  const lines = castSixLines2();
  const mainBin = linesToBinary(lines);
  const nuclearBin = nuclearBinary(lines);
  const main = binaryToHex(mainBin);
  const nuclear = binaryToHex(nuclearBin);
  const anyChange = lines.some(l => l[2] === "老阴" || l[2] === "老阳");
  const changed = anyChange ? binaryToHex(mainBin) : null;
  return {
    question: question || "",
    lines: lines.map(l => [l[0], l[1], l[2]]),
    main_num: main.num,
    nuclear_num: nuclear.num,
    changed_num: changed ? changed.num : null,
  };
}

function renderHexSvg(lines, width=160) {
  const lineH = 14, gap = 6, padX = 18, padY = 10;
  const h_ = 6 * lineH + 5 * gap + padY * 2;
  let svg = `<svg class="bagua-svg" viewBox="0 0 ${width} ${h_}" width="${width}" height="${h_}">`;
  for (let i = 5; i >= 0; i--) {
    const ln = lines[i];
    const isYang = ln[1] === 1;
    const isOld = ln[2] === "老阴" || ln[2] === "老阳";
    const y = padY + (5 - i) * (lineH + gap);
    const x1 = padX, x2 = width - padX;
    const cls = isOld ? "bagua-old" : (isYang ? "bagua-yang" : "");
    if (isYang) {
      svg += `<line class="bagua-line ${cls}" x1="${x1}" y1="${y}" x2="${x2}" y2="${y}"/>`;
    } else {
      const mid = (x1 + x2) / 2;
      const seg = (x2 - x1) * 0.40;
      svg += `<line class="bagua-line ${cls}" x1="${x1}" y1="${y}" x2="${mid - 4}" y2="${y}"/>`;
      svg += `<line class="bagua-line ${cls}" x1="${mid + 4}" y1="${y}" x2="${x2}" y2="${y}"/>`;
    }
    if (isOld) {
      svg += `<text class="bagua-mark" x="${x2 + 6}" y="${y + 4}">×</text>`;
    }
  }
  svg += "</svg>";
  return svg;
}

function renderPanel(panelId, h, lines) {
  const el = document.getElementById(panelId);
  el.classList.remove("dim");
  el.innerHTML = `
    <h3>${panelId === "panel-main" ? "本 卦" : panelId === "panel-nuclear" ? "互 卦" : "变 卦"}</h3>
    <div class="hex-name">${TRIGRAM_GLYPH[h.upper] || ""}${TRIGRAM_GLYPH[h.lower] || ""} ${h.name}</div>
    <div class="hex-meta">第 ${h.num} 卦 · ${h.upper}上 ${h.lower}下</div>
    <div class="hex-binary">${h.binary}</div>
    <div>${renderHexSvg(lines)}</div>
    <div class="hex-guaci">卦辞:${h.guaci}</div>
  `;
}

function renderDetail(result) {
  const main = HEX_BY_NUM[result.main_num];
  const nuclear = HEX_BY_NUM[result.nuclear_num];
  const changed = result.changed_num ? HEX_BY_NUM[result.changed_num] : null;
  const moving = result.lines
    .map((l, i) => ({ line: l, idx: i + 1 }))
    .filter(x => x.line[2] === "老阴" || x.line[2] === "老阳");
  let html = "";
  if (result.question) {
    html += `<div class="hex-section"><h3>所 问</h3><div class="guaci">${escapeHtml(result.question)}</div></div>`;
  }
  for (const [h, label] of [[main, "本 卦"], [nuclear, "互 卦"]]) {
    html += `<div class="hex-section">
      <h3>${label} · 第 ${h.num} 卦 ${h.name} (${h.upper}上 ${h.lower}下)</h3>
      <div class="guaci">卦辞:${h.guaci}</div>
      <div class="xiang">象传:${h.xiangzhuan}</div>
      <ul class="lines">
        ${h.lines.map((ln, i) => {
          const isMoving = moving.some(m => m.idx === i + 1);
          return `<li class="${isMoving ? "moving" : ""}">${ln}</li>`;
        }).join("")}
      </ul>
    </div>`;
  }
  if (changed) {
    html += `<div class="hex-section">
      <h3>变 卦 · 第 ${changed.num} 卦 ${changed.name} (${changed.upper}上 ${changed.lower}下)</h3>
      <div class="guaci">卦辞:${changed.guaci}</div>
      <div class="xiang">象传:${changed.xiangzhuan}</div>
    </div>`;
  } else {
    html += `<div class="hex-section" style="color:var(--muted)"><em>无动爻,本卦为终。</em></div>`;
  }
  if (moving.length) {
    html += `<div class="hex-section"><h3>动 爻</h3>
      <div class="guaci">第 ${moving.map(m => m.idx).join("、")} 爻 (${moving.map(m => m.line[2]).join("、")})</div>
    </div>`;
  }
  document.getElementById("detail-body").innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  })[c]);
}

let currentCast = null;
const $ = id => document.getElementById(id);

function doCast() {
  const q = $("q").value.trim();
  currentCast = cast(q);
  renderPanel("panel-main", HEX_BY_NUM[currentCast.main_num], currentCast.lines);
  renderPanel("panel-nuclear", HEX_BY_NUM[currentCast.nuclear_num], currentCast.lines);
  if (currentCast.changed_num) {
    renderPanel("panel-changed", HEX_BY_NUM[currentCast.changed_num], currentCast.lines);
  } else {
    const cp = $("panel-changed");
    cp.classList.add("dim");
    cp.innerHTML = `<h3>变 卦</h3><div class="hex-empty">— 无动爻,本卦为终 —</div>`;
  }
  renderDetail(currentCast);
  $("status").textContent = `起卦完成 · 主卦 #${currentCast.main_num} ${HEX_BY_NUM[currentCast.main_num].name}` +
    (currentCast.changed_num ? ` · 变卦 #${currentCast.changed_num}` : " · 无动爻");
  $("btn-ask").disabled = false;
  $("ai-out").textContent = "点 \"问道士\" 让 AI 解读本卦";
  $("ai-out").classList.add("empty");
}

    parts.push(`${label}:第${h.num}卦 ${h.name}(${h.upper}上 ${h.lower}下)`);
    parts.push(`  卦辞:${h.guaci}`);
    parts.push(`  象传:${h.xiangzhuan}`);
    parts.push(`  爻辞:`);
    for (const ln of h.lines) parts.push(`    ${ln}`);
    parts.push("");
  }
  if (changed) {
    parts.push(`变卦:第${changed.num}卦 ${changed.name}(${changed.upper}上 ${changed.lower}下)`);
    parts.push(`  卦辞:${changed.guaci}`);
    parts.push(`  象传:${changed.xiangzhuan}`);
  } else {
    parts.push(`变卦:无(本卦无动爻,主卦为终)`);
  }
  parts.push("");
  if (moving.length) parts.push(`动爻位置:第 ${moving.map(m => m.idx).join("、")} 爻(共 ${moving.length} 个)`);
  else parts.push(`动爻:无`);
  parts.push("");
  parts.push("请据此解卦,以白话答之。");
  return parts.join("\n");
}

async function askExpert() {
  if (!currentCast) return;
  const cfg = loadCfg();
  if (!cfg.key || !cfg.url || !cfg.model) {
    alert("请先在「设置」填 API Key 和厂商。");
    openSettings();
    return;
  }
  const status = $("ai-status"), out = $("ai-out");
  out.classList.remove("empty");
  out.textContent = "道士正在解卦...";
  status.classList.add("busy");
  status.textContent = "解卦中…";
  $("btn-ask").disabled = true;
  const payload = {
    model: cfg.model,
    messages: [
      { role: "system", content: SYS_PROMPT },
      { role: "user", content: buildUserPrompt(currentCast) },
    ],
    stream: true, temperature: 0.7,
  };
  try {
    const resp = await fetch(cfg.url.replace(/\/$/, "") + "/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + cfg.key },
      body: JSON.stringify(payload),
    });
    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error("HTTP " + resp.status + ": " + errText.slice(0, 400));
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "", full = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        const t = line.trim();
        if (!t.startsWith("data:")) continue;
        const data = t.slice(5).trim();
        if (data === "[DONE]") continue;
        try {
          const obj = JSON.parse(data);
          const tok = obj.choices?.[0]?.delta?.content || "";
          if (tok) { full += tok; out.textContent = full; }
        } catch {}
      }
    }
    status.textContent = "解卦完成";
  } catch (e) {
    out.textContent = "[出错] " + e.message;
    status.textContent = "失败";
  } finally {
    status.classList.remove("busy");
    $("btn-ask").disabled = false;
  }
}

function openSettings() {
  const cfg = loadCfg();
  const p = cfg.provider || "deepseek";
  $("cfg-provider").value = p;
  $("cfg-key").value = cfg.key || "";
  if (PRESETS[p]) {
    $("cfg-url").value = cfg.url || PRESETS[p].url;
    $("cfg-model").value = cfg.model || PRESETS[p].model;
  } else {
    $("cfg-url").value = cfg.url || "";
    $("cfg-model").value = cfg.model || "";
  }
  $("modal").classList.add("show");
}
function closeSettings() { $("modal").classList.remove("show"); }
$("btn-settings").onclick = openSettings;
$("cfg-cancel").onclick = closeSettings;
$("modal").onclick = (e) => { if (e.target === $("modal")) closeSettings(); };
$("cfg-provider").onchange = (e) => {
  const p = e.target.value;
  if (PRESETS[p] && p !== "custom") {
    $("cfg-url").value = PRESETS[p].url;
    $("cfg-model").value = PRESETS[p].model;
  }
};
$("cfg-save").onclick = () => {
  const p = $("cfg-provider").value;
  const cfg = {
    provider: p,
    key: $("cfg-key").value.trim(),
    url: $("cfg-url").value.trim(),
    model: $("cfg-model").value.trim(),
  };
  const fix = {
    "minimax-chat": "MiniMax-Text-01",
    "minimax": "MiniMax-Text-01",
    "MiniMax-chat": "MiniMax-Text-01",
    "MiniMax": "MiniMax-Text-01",
    "abab5.5-chat": "MiniMax-Text-01",
    "abab6.5s-chat": "MiniMax-Text-01",
  };
  if (fix[cfg.model]) cfg.model = fix[cfg.model];
  saveCfg(cfg);
  $("ai-status").textContent = cfg.key ? "已配置 · " + (PRESETS[p]?.model || cfg.model) : "未配置";
  $("ai-status").classList.remove("busy");
  closeSettings();
};
$("cfg-clear").onclick = () => {
  clearCfg();
  $("cfg-key").value = ""; $("cfg-url").value = ""; $("cfg-model").value = "";
  $("ai-status").textContent = "未配置";
};

$("btn-cast").onclick = doCast;
$("fab").onclick = doCast;
$("btn-ask").onclick = askExpert;
$("q").addEventListener("keydown", e => { if (e.key === "Enter") doCast(); });

const initCfg = loadCfg();
if (initCfg.key) {
  $("ai-status").textContent = "已配置 · " + (initCfg.model || "");
  $("ai-status").classList.remove("busy");
}
</script>
